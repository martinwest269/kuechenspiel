<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Küchen-Gewinnspiel</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 10px; }
        .wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .box { position: relative; width: 95%; max-width: 600px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); line-height: 0; }
        img { width: 100%; height: auto; display: block; background: #ddd; min-height: 150px; }
        #right-box { cursor: crosshair; }
        .marker { position: absolute; border: 3px solid #27ae60; background: rgba(39,174,96,0.3); border-radius: 50%; width: 10%; height: 10%; min-width: 30px; min-height: 30px; transform: translate(-50%, -50%); pointer-events: none; }
        #win { display: none; margin: 20px auto; padding: 20px; max-width: 500px; background: #dff0d8; border: 2px solid #3c763d; border-radius: 10px; }
        .btn { background: #27ae60; color: white; padding: 15px 25px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
        #admin-info { background: #eee; padding: 10px; margin-top: 50px; font-size: 12px; color: #666; border-top: 1px dashed #ccc; }
    </style>
</head>
<body>

    <h2>Finde die 5 Unterschiede!</h2>
    <p>Klicke auf die Fehler im <strong>unteren</strong> Bild.</p>

    <div class="wrapper">
        <div class="box"><img id="left" src="" alt="Original"></div>
        <div class="box" id="right-box" onclick="handleImageClick(event)"><img id="right" src="" alt="Fehlerbild"></div>
    </div>

    <div id="win">
        <h2>🎉 Glückwunsch!</h2>
        <p>Du hast das Geschenk freigeschaltet: <strong id="gift-display"></strong></p>
        <button class="btn" onclick="sendMail()">Geschenk jetzt anfordern</button>
    </div>

    <div id="admin-info">
        <strong>Admin-Hilfe:</strong> Klicke auf das untere Bild, um Koordinaten für den Link zu erhalten:<br>
        <span id="coords-output">Noch kein Klick...</span>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const kundenID = params.get('id') || 'test';
        const geschenk = params.get('gift') || 'eine Überraschung';
        
        // Bilder laden
        document.getElementById('left').src = kundenID + "/test_links.jpg";
        document.getElementById('right').src = kundenID + "/test_rechts.jpg";
        document.getElementById('gift-display').innerText = geschenk;

        // Fehler aus der URL laden (x1, y1 bis x5, y5)
        let targets = [];
        for(let i=1; i<=5; i++) {
            targets.push({
                x: parseFloat(params.get('x'+i)) || 0,
                y: parseFloat(params.get('y'+i)) || 0,
                found: false
            });
        }
        
        let foundCount = 0;

        function handleImageClick(e) {
            const rect = document.getElementById('right').getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            // Admin-Ausgabe (Hilft dir beim Link erstellen)
            document.getElementById('coords-output').innerText = `&x${foundCount+1}=${x.toFixed(1)}&y${foundCount+1}=${y.toFixed(1)}`;

            targets.forEach(t => {
                if(t.x !== 0 && !t.found && Math.abs(x - t.x) < 7 && Math.abs(y - t.y) < 7) {
                    t.found = true;
                    foundCount++;
                    drawMarker(e.clientX - rect.left, event.clientY - rect.top);
                }
            });

            if(foundCount === 5) {
                document.getElementById('win').style.display = 'block';
                document.getElementById('win').scrollIntoView({behavior: 'smooth'});
            }
        }

        function drawMarker(x, y) {
            const m = document.createElement('div');
            m.className = 'marker';
            m.style.left = x + 'px';
            m.style.top = y + 'px';
            document.getElementById('right-box').appendChild(m);
        }

        function sendMail() {
            const mailTo = "m.westreicher@foeger.at"; // DEINE ADRESSE HIER
            const subject = "Küchen-Gewinnspiel gelöst: " + kundenID;
            const body = "Ich habe alle 5 Fehler gefunden und freue mich auf mein Geschenk: " + geschenk;
            window.location.href = "mailto:" + mailTo + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
        }
    </script>
</body>
</html>
