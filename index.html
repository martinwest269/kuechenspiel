<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Küchen-Gewinnspiel</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 10px; }
        .wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .box { position: relative; width: 95%; max-width: 600px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); line-height: 0; }
        img { width: 100%; height: auto; display: block; }
        #right-box { cursor: crosshair; }
        .marker { position: absolute; border: 3px solid #27ae60; background: rgba(39,174,96,0.3); border-radius: 50%; width: 8%; height: 8%; min-width: 25px; min-height: 25px; transform: translate(-50%, -50%); pointer-events: none; }
        #win { display: none; margin-top: 20px; padding: 20px; background: #dff0d8; border: 2px solid #3c763d; border-radius: 10px; }
        .btn { background: #27ae60; color: white; padding: 15px 25px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2 id="title">Finden Sie die 5 Fehler!</h2>
    <p id="instruction">Klicken Sie auf die Unterschiede im unteren Bild.</p>

    <div class="wrapper">
        <div class="box"><img id="left" src="" alt="Original"></div>
        <div class="box" id="right-box" onclick="handleImageClick(event)"><img id="right" src="" alt="Fehlerbild"></div>
    </div>

    <div id="win">
        <h2>🎉 Glückwunsch!</h2>
        <p>Sie erhalten: <strong id="gift-display"></strong></p>
        <button class="btn" onclick="sendMail()">Geschenk jetzt anfordern</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const kundenID = params.get('id') || 'test';
        const geschenk = params.get('gift') || 'eine Überraschung';
        
        // Bilder laden
        document.getElementById('left').src = kundenID + "/test_links.jpg";
        document.getElementById('right').src = kundenID + "/test_rechts.jpg";
        document.getElementById('gift-display').innerText = geschenk;

        // Hier werden die Koordinaten gespeichert
        // Damit du nicht programmieren musst, habe ich hier 5 Standard-Punkte gelassen.
        // Du kannst diese Zahlen hier einmalig anpassen, wenn du deine Fehler immer an der gleichen Stelle einbaust.
        let targets = [
            {x: 20, y: 20}, {x: 80, y: 20}, {x: 50, y: 50}, {x: 20, y: 80}, {x: 80, y: 80}
        ];
        
        let foundCount = 0;

        function handleImageClick(e) {
            const rect = document.getElementById('right').getBoundingClientRect();
            // Berechnung in Prozent (wichtig für Smartphones!)
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            // Log für dich im Hintergrund (Konsole), um die Werte zu sehen
            console.log("Klick bei: x=" + x.toFixed(2) + "%, y=" + y.toFixed(2) + "%");

            targets.forEach(t => {
                if(!t.found && Math.abs(x - t.x) < 7 && Math.abs(y - t.y) < 7) {
                    t.found = true;
                    foundCount++;
                    drawMarker(e.clientX - rect.left, e.clientY - rect.top);
                }
            });

            if(foundCount === 5) {
                document.getElementById('win').style.display = 'block';
                document.getElementById('win').scrollIntoView({behavior: 'smooth'});
            }
        }

        function drawMarker(x, y) {
            const m = document.createElement('div');
            m.className = 'marker';
            m.style.left = x + 'px';
            m.style.top = y + 'px';
            document.getElementById('right-box').appendChild(m);
        }

        function sendMail() {
            const mailTo = "deine-email@beispiel.at"; // DEINE ADRESSE HIER
            const subject = "Küchen-Gewinnspiel gelöst: " + kundenID;
            const body = "Ich habe alle 5 Fehler gefunden und freue mich auf mein Geschenk: " + geschenk;
            window.location.href = "mailto:" + mailTo + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
        }
    </script>
</body>
</html>
